  <button type="btn btn-sucess" onclick="Heatindex()" style="color:#ffffff; font-size: 25px; background-color:#ffc77e">Submit</button>

 <script>
        function Heatindex(){
            var temp = parseFloat(document.getElementById("degrees").value);
            var humidity = parseFloat (document.getElementById("humidity").value);
            var HI = temp + (0.33 * humidity) - 4;

            var message="";

            switch (true) {
                case(HI <= 27):
                status="Comfortable n Cool";
                break;
                case(HI<= 32):
                status="Warm yk"
                break;
                case (HI <= 41):
                    status = "Very very Hot"
                break;
                default:
                    Kindly input numbers

            }
            alert("Heatindex: "+ HI.toFixed(2)+ "status:" + message);
        }
    </script>
